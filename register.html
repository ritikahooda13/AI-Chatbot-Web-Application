<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - AI Chat Assistant</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans antialiased flex items-center justify-center px-4">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <div class="bg-gradient-to-tr from-blue-600 to-violet-600 p-3 rounded-2xl shadow-lg shadow-blue-500/20 inline-flex">
                <i class="fas fa-robot text-3xl text-white"></i>
            </div>
            <h1 class="text-2xl font-black tracking-wider mt-4 bg-gradient-to-r from-white via-slate-200 to-slate-400 bg-clip-text text-transparent">AI Chat Assistant</h1>
            <p class="text-slate-400 text-sm mt-1">Create your account to get started</p>
        </div>

        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-8 shadow-2xl">
            {% if error %}
            <div class="bg-red-500/10 border border-red-500/30 text-red-400 text-sm rounded-xl p-3 mb-5 flex items-center">
                <i class="fas fa-circle-exclamation mr-2"></i>{{ error }}
            </div>
            {% endif %}

            <form method="POST" class="space-y-4">
                <div>
                    <label class="text-xs font-semibold text-slate-400 uppercase tracking-wide">Username</label>
                    <input type="text" name="username" required autofocus
                        class="mt-1.5 w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 transition-all">
                </div>
                <div>
                    <label class="text-xs font-semibold text-slate-400 uppercase tracking-wide">Password</label>
                    <input type="password" name="password" required minlength="4"
                        class="mt-1.5 w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 transition-all">
                </div>
                <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-500 active:scale-[0.98] text-white rounded-xl px-5 py-3 font-semibold transition-all shadow-lg shadow-blue-500/20">
                    Create Account
                </button>
            </form>

            <p class="text-center text-sm text-slate-400 mt-6">
                Already have an account?
                <a href="{{ url_for('login') }}" class="text-blue-400 hover:text-blue-300 font-semibold">Sign in</a>
            </p>
        </div>
    </div>
</body>
</html>
